name: scout-smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-scout-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Scout pipeline without publishing artifacts
        env:
          SCOUT_DATA_DIR: .scout
        run: |
          go run ./cmd/scout run
